<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Skill Trade</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2ecc71;
            --error-color: #e74c3c;
            --dark-color: #2c3e50;
            --light-color: #ecf0f1;
            --box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: all 0.3s ease;
        }

        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="white" fill-opacity="0.05"/></svg>');
            background-size: 50px 50px;
            top: -50%;
            left: -50%;
            z-index: 0;
            animation: backgroundAnimation 60s linear infinite;
        }

        @keyframes backgroundAnimation {
            0% {
                transform: translateX(0) translateY(0) rotate(0deg);
            }
            100% {
                transform: translateX(100px) translateY(100px) rotate(360deg);
            }
        }

        .container {
            background-color: rgba(255, 255, 255, 0.95);
            width: 400px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: var(--box-shadow);
            position: relative;
            z-index: 1;
            backdrop-filter: blur(10px);
        }

        h2 {
            color: var(--dark-color);
            text-align: center;
            margin-bottom: 30px;
            font-size: 32px;
            position: relative;
            padding-bottom: 10px;
        }

        h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
        }

        .logo {
            display: block;
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background-color: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: none;
            background-color: var(--light-color);
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            color: var(--dark-color);
        }

        .input-group input:focus {
            box-shadow: 0 0 0 2px var(--primary-color);
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--dark-color);
            opacity: 0.7;
        }

        .error-message {
            color: var(--error-color);
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }

        .login-button {
            display: block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
            position: relative;
            overflow: hidden;
            text-align: center;
            text-decoration: none;
        }

        .login-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: all 0.6s;
        }

        .login-button:hover::before {
            left: 100%;
        }

        .login-button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 5px rgba(46, 204, 113, 0.4);
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
        }

        .remember-me input {
            margin-right: 5px;
        }

        .forgot-password a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .divider {
            position: relative;
            text-align: center;
            margin: 25px 0;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 40%;
            height: 1px;
            background-color: rgba(0, 0, 0, 0.1);
        }

        .divider::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            width: 40%;
            height: 1px;
            background-color: rgba(0, 0, 0, 0.1);
        }

        .social-login {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .facebook {
            background-color: #3b5998;
        }

        .google {
            background-color: #db4437;
        }

        .twitter {
            background-color: #1da1f2;
        }

        .signup-link {
            text-align: center;
            margin-top: 20px;
            font-size: 15px;
            color: var(--dark-color);
        }

        .signup-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        /* Responsive styles */
        @media (max-width: 480px) {
            .container {
                width: 90%;
                padding: 30px 20px;
            }

            h2 {
                font-size: 24px;
            }

            .logo {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }
        }

        /* Animation for invalid inputs */
        .shake {
            animation: shake 0.5s linear;
        }

        @keyframes shake {
            0%, 100% {
                transform: translateX(0);
            }
            20%, 60% {
                transform: translateX(-5px);
            }
            40%, 80% {
                transform: translateX(5px);
            }
        }

        /* Loading animation */
        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes spin {
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <i class="fas fa-exchange-alt"></i>
        </div>
        <h2>Welcome Back</h2>
        <form id="loginForm">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="loginEmail" placeholder="Email Address" required>
                <div class="error-message" id="emailError"></div>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <div class="error-message" id="passwordError"></div>
            </div>
            <div class="options">
                <div class="remember-me">
                    <input type="checkbox" id="remember">
                    <label for="remember">Remember me</label>
                </div>
                <div class="forgot-password">
                    <a href="#">Forgot Password?</a>
                </div>
            </div>
            <button type="submit" class="login-button">
                <span>Login to Skill Trade</span>
                <div class="loader"></div>
            </button>
        </form>
        <div class="divider">OR</div>
        <div class="social-login">
            <div class="social-btn facebook">
                <i class="fab fa-facebook-f"></i>
            </div>
            <div class="social-btn google">
                <i class="fab fa-google"></i>
            </div>
            <div class="social-btn twitter">
                <i class="fab fa-twitter"></i>
            </div>
        </div>
        <div class="signup-link">
            New to Skill Trade? <a href="signup.html">Create an account</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('loginForm');
            const emailInput = document.getElementById('loginEmail');
            const passwordInput = document.getElementById('loginPassword');
            const loginButton = document.querySelector('.login-button');
            const buttonText = loginButton.querySelector('span');
            const loader = loginButton.querySelector('.loader');
            const emailError = document.getElementById('emailError');
            const passwordError = document.getElementById('passwordError');
            const rememberCheckbox = document.getElementById('remember');

            // Check if there are saved credentials
            if (localStorage.getItem('rememberMe') === 'true') {
                const savedEmail = localStorage.getItem('email');
                const savedPassword = localStorage.getItem('password');
                if (savedEmail) emailInput.value = savedEmail;
                if (savedPassword) passwordInput.value = savedPassword;
                rememberCheckbox.checked = true;
            }

            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                // Reset error messages
                emailError.style.display = 'none';
                passwordError.style.display = 'none';
                
                // Get values
                const email = emailInput.value;
                const password = passwordInput.value;
                const rememberMe = rememberCheckbox.checked;
                
                // Validation
                let isValid = true;
                
                if (!email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
                    emailError.textContent = 'Please enter a valid email address';
                    emailError.style.display = 'block';
                    emailInput.classList.add('shake');
                    setTimeout(() => emailInput.classList.remove('shake'), 500);
                    isValid = false;
                }
                
                if (password.length < 6) {
                    passwordError.textContent = 'Password must be at least 6 characters';
                    passwordError.style.display = 'block';
                    passwordInput.classList.add('shake');
                    setTimeout(() => passwordInput.classList.remove('shake'), 500);
                    isValid = false;
                }
                
                if (!isValid) return;
                
                // Show loading state
                buttonText.style.opacity = '0';
                loader.style.display = 'block';
                loginButton.disabled = true;
                
                try {
                    const response = await fetch('http://localhost:5000/api/v1/auth/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            email,
                            password
                        }),
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        // Save credentials if "Remember me" is checked
                        if (rememberMe) {
                            localStorage.setItem('rememberMe', 'true');
                            localStorage.setItem('email', email);
                            localStorage.setItem('password', password);
                        } else {
                            localStorage.removeItem('rememberMe');
                            localStorage.removeItem('email');
                            localStorage.removeItem('password');
                        }
                        
                        // Store the token in localStorage
                        localStorage.setItem('token', data.token);
                        
                        // Redirect to dashboard
                        window.location.href = 'dashboard.html';
                    } else {
                        // Show error message
                        passwordError.textContent = data.message || 'Login failed. Please try again.';
                        passwordError.style.display = 'block';
                        
                        // Reset button state
                        buttonText.style.opacity = '1';
                        loader.style.display = 'none';
                        loginButton.disabled = false;
                    }
                } catch (err) {
                    console.error('Login error:', err);
                    passwordError.textContent = 'An error occurred. Please try again.';
                    passwordError.style.display = 'block';
                    
                    // Reset button state
                    buttonText.style.opacity = '1';
                    loader.style.display = 'none';
                    loginButton.disabled = false;
                }
            });
            
            // Social login handlers (placeholder - you would implement these with OAuth)
            document.querySelector('.facebook').addEventListener('click', () => {
                alert('Facebook login would be implemented here');
            });
            
            document.querySelector('.google').addEventListener('click', () => {
                alert('Google login would be implemented here');
            });
            
            document.querySelector('.twitter').addEventListener('click', () => {
                alert('Twitter login would be implemented here');
            });
        });
    </script>
</body>
</html>
